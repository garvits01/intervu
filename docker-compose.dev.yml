version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: haveloc-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: haveloc
      POSTGRES_PASSWORD: haveloc_dev_2026
      POSTGRES_DB: haveloc_pro
    volumes:
      - haveloc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haveloc -d haveloc_pro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: haveloc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - haveloc_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  haveloc_pgdata:
  haveloc_redis:
