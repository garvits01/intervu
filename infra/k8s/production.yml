# Haveloc Pro — Kubernetes Manifests
# API Service Deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: haveloc-api
  namespace: haveloc-pro
  labels:
    app: haveloc-api
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: haveloc-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: haveloc-api
    spec:
      containers:
        - name: api
          image: ghcr.io/haveloc/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: haveloc-secrets
            - configMapRef:
                name: haveloc-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: haveloc-api
  namespace: haveloc-pro
spec:
  selector:
    app: haveloc-api
  ports:
    - port: 80
      targetPort: 4000
  type: ClusterIP
---
# Web Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haveloc-web
  namespace: haveloc-pro
  labels:
    app: haveloc-web
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: haveloc-web
  template:
    metadata:
      labels:
        app: haveloc-web
    spec:
      containers:
        - name: web
          image: ghcr.io/haveloc/web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: haveloc-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: haveloc-web
  namespace: haveloc-pro
spec:
  selector:
    app: haveloc-web
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
# AI Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haveloc-ai
  namespace: haveloc-pro
  labels:
    app: haveloc-ai
    tier: ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: haveloc-ai
  template:
    metadata:
      labels:
        app: haveloc-ai
    spec:
      nodeSelector:
        workload: ai
      tolerations:
        - key: workload
          value: ai
          effect: NoSchedule
      containers:
        - name: ai
          image: ghcr.io/haveloc/ai-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: haveloc-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: haveloc-ai
  namespace: haveloc-pro
spec:
  selector:
    app: haveloc-ai
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: haveloc-ingress
  namespace: haveloc-pro
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERT_ARN}
spec:
  rules:
    - host: app.havelocpro.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: haveloc-web
                port:
                  number: 80
    - host: api.havelocpro.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: haveloc-api
                port:
                  number: 80
---
# HPA for API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: haveloc-api-hpa
  namespace: haveloc-pro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: haveloc-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
