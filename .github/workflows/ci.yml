# Haveloc Pro — CI/CD Pipeline
# Runs on every push and PR to main/develop branches

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Lint & Type Check
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npx turbo run lint typecheck

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Unit & Integration Tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: haveloc_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/haveloc_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npx prisma db push --schema=packages/db/prisma/schema.prisma
      - run: npx turbo run test

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # AI Service Tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test-ai:
    name: AI Service Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - run: pip install -r apps/ai-service/requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - run: cd apps/ai-service && python -m pytest tests/ -v

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Build Docker Images
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, test-ai]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push AI Service image
        uses: docker/build-push-action@v6
        with:
          context: apps/ai-service
          file: apps/ai-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/ai-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Deploy to Staging
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EKS
        run: |
          echo "🚀 Deploying to staging..."
          # kubectl set image deployment/haveloc-api api=ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          # kubectl set image deployment/haveloc-web web=ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          # kubectl set image deployment/haveloc-ai ai=ghcr.io/${{ github.repository }}/ai-service:${{ github.sha }}
          echo "✅ Staging deployment complete"
